# Package and release the plugin when a version tag is pushed.
# Push a tag matching manifest.json's version (e.g. v1.2.0) and this builds
# the bundle, zips manifest.json + the manifest-declared files, creates the
# GitHub release with the zip attached, and puts the sha256 plus a
# ready-to-paste marketplace registration snippet in the release notes.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - name: Package and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          id=$(node -p "require('./manifest.json').id")
          version=$(node -p "require('./manifest.json').version")
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "manifest.json version is $version but the tag is $GITHUB_REF_NAME; bump one to match" >&2
            exit 1
          fi
          files=$(node -p "(require('./manifest.json').files ?? ['main.js']).join(' ')")
          zip -X -q "$id.zip" manifest.json $files
          sha256=$(sha256sum "$id.zip" | cut -d' ' -f1)
          export URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/$id.zip"
          export SHA256="$sha256"
          {
            echo "sha256: \`$sha256\`"
            echo
            echo "To list this release on the [Glyph marketplace](https://github.com/glyph-md/plugins), open a PR adding \`plugins/$id/plugin.json\` (plus a \`README.md\`):"
            echo
            echo '```json'
            node -e "
              const m = require('./manifest.json');
              console.log(JSON.stringify({
                id: m.id,
                name: m.name,
                version: m.version,
                description: m.description,
                category: 'tools',
                packageUrl: process.env.URL,
                sha256: process.env.SHA256,
              }, null, 2));
            "
            echo '```'
          } > notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "$id v$version" --notes-file notes.md "$id.zip"
